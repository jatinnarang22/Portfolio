<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact.css">
    <title>css grid</title>
</head>
<body>

    <div class="full">
    <p style="text-align:center;color: white;
    color: #ff254b;font-size:1.5rem; margin-top: 20px;">CONTACT</p>
    <h1 style="color: white;font-size: 3rem; ">GET IN TOUCH</h1>
    <div class="container">
        <div class="item item1">
            <div class="initem">
                <div><img style="height:30px;width:30px;" src="./photos/phonecall.png" alt="icon"></div>
                <div>Phone</div>
                <div>+91-9416544345</div>
            </div>
        </div>
        <div class="item item2">
            <div class="initem">
                <div><img style="height:30px;width:30px;" src="./photos/gmail.png" alt="icon"></div>
                <div>E-mail</div>
                <div>Jatin1273@Chitkara.edu.in</div>
            </div>
        </div>
        <div class="item item3">
            <div class="initem">
                <div><img style="height:30px;width:35px;" src="./photos/location.png" alt="icon"></div>
                <div>Address</div>
                <div>Sirsa,Haryana  ,India</div>
            </div>
        </div>
        <div class="item4">
            <div class="initem4">
                <div class="item ">           
                    <input placeholder="Name" style="width: 90%;" ></input>
                </div>
                <div class="item ">
                    <input placeholder="Email" type="email" style="width: 90%;" ></input>
                </div>
                <div class="item ">
                    <input placeholder="Subject" style="width: 90%;"></input>

                </div>
            </div>
        </div>

        <div class="item item5" >
            <textarea rows="10" cols="47" placeholder="Message" style="color:white;overflow: auto;outline: none;font-size: 20px;resize:none;margin:10px;background-color:transparent;border:none; width: 90%;height: 90%;"></textarea>
        </div>
        

    </div>
</div>
</body>
</html>
